name: Checkov IaC Scan

# Run the scan when code is pushed or a PR is opened
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Minimal permissions required for this workflow
permissions:
  contents: read
  security-events: write   # required to upload SARIF results to Code Scanning

jobs:
  checkov:
    name: Run Checkov
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the repository code so the scanner can analyze it
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Run Checkov against the Terraform example directory
      # soft_fail ensures the workflow does not fail if issues are found
      # results are exported as SARIF for GitHub security dashboard
      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: iac_examples/terraform
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true

      # Step 3: Upload SARIF results so findings appear in:
      # Security → Code scanning
      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
