name: Gitleaks Secret Scan

# Run when code is pushed or PRs are opened
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Minimal permissions needed
permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Run Gitleaks
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository so the scanner can read the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Run Gitleaks to detect secrets
      # SARIF output allows integration with GitHub Code Scanning
      - name: Run Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --report-format sarif --report-path gitleaks.sarif

      # Step 3: Upload results to GitHub Security dashboard
      - name: Upload Gitleaks results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
