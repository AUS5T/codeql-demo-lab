name: Gitleaks Secret Scan

# Run when code is pushed or PRs opened
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Run Gitleaks
    runs-on: ubuntu-latest

    steps:
      # Checkout repo so scanner can read files
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Gitleaks CLI
      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64.tar.gz
          tar -xzf gitleaks-linux-amd64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      # Run scan and export SARIF results
      - name: Run Gitleaks scan
        run: |
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            || true

      # Upload results to GitHub Code Scanning
      - name: Upload Gitleaks results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
